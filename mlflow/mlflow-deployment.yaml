apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-server
  namespace: kubeflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: mlflow/mlflow:v2.5.0
        command:
        - mlflow
        - server
        - --host=0.0.0.0
        - --port=5000
        - --default-artifact-root=s3://enterprise-model-registry/artifacts
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: kubeflow
spec:
  selector:
    app: mlflow
  ports:
  - port: 5000
    targetPort: 5000
